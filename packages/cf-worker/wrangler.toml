# Webflow 中国大陆加速 — CF Worker 配置
 # 部署方式：点 Deploy 按钮 → 自动创建 Worker + R2 Bucket + 绑定（零配置可用）
 # 默认代理 webflowcn.webflow.io（演示站点），可在 Cloudflare 面板修改变量覆盖
 
 name = "webflow-china-speedup"
 main = "worker.js"
 compatibility_date = "2026-05-07"
 
 [placement]
 mode = "smart"
 
 
 [[r2_buckets]]
 binding = "MY_BUCKET"
 bucket_name = "webflow-china-speedup-assets"
